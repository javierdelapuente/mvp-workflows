name: Generate plan and build

on:
  workflow_call:
    outputs:
      plan:
        description: "The generated build-plan.yaml contents (base64-encoded)"
        value: ${{ jobs.generate-plan.outputs.plan }}

jobs:
  generate-plan:
    name: Generate build plan
    runs-on: ubuntu-latest
    outputs:
      plan: ${{ steps.plan.outputs.plan }}
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Checkout mvp-workflows
        uses: actions/checkout@v4
        with:
          repository: javierdelapuente/mvp-workflows
          path: .mvp-workflows

      - name: Install yq
        run: sudo snap install yq

      - name: Generate build plan
        id: plan
        run: |
          .mvp-workflows/generate-plan .
          echo "plan=$(base64 -w0 build-plan.yaml)" >> "$GITHUB_OUTPUT"

      - name: Upload build-plan.yaml
        uses: actions/upload-artifact@v4
        with:
          name: build-plan
          path: build-plan.yaml

  build:
    name: Build
    needs: generate-plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Checkout mvp-workflows
        uses: actions/checkout@v4
        with:
          repository: javierdelapuente/mvp-workflows
          path: .mvp-workflows

      - name: Download build-plan.yaml
        uses: actions/download-artifact@v4
        with:
          name: build-plan

      - name: Set up LXD
        run: |
          if snap list lxd 2>/dev/null; then
            sudo snap refresh lxd --channel=latest/stable --cohort=+
          else
            sudo snap install lxd --channel=latest/stable --cohort=+
          fi
          sudo lxd waitready
          sudo lxd init --auto
          sudo lxc config set images.compression_algorithm none
          # Allow LXD bridge traffic through the Docker firewall chain (if present)
          if sudo iptables -nL DOCKER-USER 2>/dev/null; then
            sudo iptables -I DOCKER-USER -i lxdbr0 -j ACCEPT
            sudo iptables -I DOCKER-USER -o lxdbr0 -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT
          fi
          sudo adduser "$USER" lxd

      - name: Install tools
        run: |
          sudo snap install yq
          sudo snap install charmcraft --classic
          sudo snap install rockcraft --classic

      - name: Build
        run: .mvp-workflows/build .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            build-output.yaml
            **/*.charm
            **/*.rock
          if-no-files-found: warn
