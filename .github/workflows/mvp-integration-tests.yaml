name: MVP integration tests

on:
  workflow_call:
    inputs:
      mvp-workflows-ref:
        description: "Ref of javierdelapuente/mvp-workflows to use"
        type: string
        default: main
    outputs:
      plan:
        description: "The generated build-plan.yaml contents (base64-encoded)"
        value: ${{ jobs.generate-plan.outputs.plan }}

jobs:
  generate-plan:
    name: Generate build plan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      plan: ${{ steps.plan.outputs.plan }}
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Checkout mvp-workflows
        uses: actions/checkout@v4
        with:
          repository: javierdelapuente/mvp-workflows
          ref: ${{ inputs.mvp-workflows-ref }}
          path: .mvp-workflows

      - name: Install yq
        run: sudo snap install yq

      - name: Generate build plan
        id: plan
        run: |
          .mvp-workflows/generate-plan .
          echo "plan=$(base64 -w0 build-plan.yaml)" >> "$GITHUB_OUTPUT"

      - name: Upload build-plan.yaml
        uses: actions/upload-artifact@v4
        with:
          name: build-plan
          path: build-plan.yaml

  build:
    name: Build
    needs: generate-plan
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Checkout mvp-workflows
        uses: actions/checkout@v4
        with:
          repository: javierdelapuente/mvp-workflows
          ref: ${{ inputs.mvp-workflows-ref }}
          path: .mvp-workflows

      - name: Download build-plan.yaml
        uses: actions/download-artifact@v4
        with:
          name: build-plan

      - name: Set up LXD
        run: |
          sudo snap install lxd --channel=latest/stable
          sudo lxd waitready --timeout=60
          sudo lxd init --auto
          sudo lxc config set images.compression_algorithm none
          sudo iptables -I DOCKER-USER -i lxdbr0 -j ACCEPT 2>/dev/null || true
          sudo iptables -I DOCKER-USER -o lxdbr0 -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT 2>/dev/null || true
          sudo adduser "$USER" lxd

      - name: Install tools
        run: |
          sudo snap install yq &
          sudo snap install charmcraft --classic &
          sudo snap install rockcraft --classic &
          wait

      - name: Build
        run: sg lxd .mvp-workflows/build .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            build-output.yaml
            **/*.charm
            **/*.rock
          if-no-files-found: warn

  discover-tests:
    name: Discover test modules
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      modules: ${{ steps.discover.outputs.modules }}
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Download build-output.yaml
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Install yq
        run: sudo snap install yq

      - name: Discover test modules
        id: discover
        run: |
          # Collect --ignore paths from extra_pytest_args
          ignored=()
          extra_count=$(yq '.charms[0].extra_pytest_args | length' build-output.yaml 2>/dev/null || echo 0)
          for i in $(seq 0 $((extra_count - 1))); do
            arg=$(yq ".charms[0].extra_pytest_args[$i]" build-output.yaml 2>/dev/null || true)
            if [[ "$arg" == --ignore=* ]]; then
              ignored+=("${arg#--ignore=}")
            fi
          done

          # Discover test_*.py files
          modules=()
          for f in tests/integration/test_*.py; do
            [ -f "$f" ] || continue
            basename=$(basename "$f")
            # Check if this file is in the ignore list
            skip=false
            for ign in "${ignored[@]}"; do
              ign_base=$(basename "$ign")
              if [[ "$basename" == "$ign_base" || "$f" == "$ign" ]]; then
                skip=true
                break
              fi
            done
            if [[ "$skip" == "false" ]]; then
              modules+=("${basename%.py}")
            fi
          done

          # Also check for ignored directories (e.g. --ignore=tests/unit_harness)
          # These are already handled above since we only look at test_*.py files

          if [[ ${#modules[@]} -eq 0 ]]; then
            echo "No test modules found!" >&2
            echo 'modules=[]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Output as JSON array
          json=$(printf '%s\n' "${modules[@]}" | jq -R . | jq -sc .)
          echo "Discovered modules: $json"
          echo "modules=$json" >> "$GITHUB_OUTPUT"

  test:
    name: "test (${{ matrix.module }})"
    needs: [build, discover-tests]
    if: ${{ needs.discover-tests.outputs.modules != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover-tests.outputs.modules) }}
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Checkout mvp-workflows
        uses: actions/checkout@v4
        with:
          repository: javierdelapuente/mvp-workflows
          ref: ${{ inputs.mvp-workflows-ref }}
          path: .mvp-workflows

      - name: Download build-plan.yaml
        uses: actions/download-artifact@v4
        with:
          name: build-plan

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Install tools
        run: |
          sudo snap install --classic concierge &
          sudo snap install --classic charmcraft &
          sudo snap install yq &
          pip install tox tox-uv &
          sudo apt install -y skopeo &
          wait

      - name: Configure networking for LXD containers
        run: |
          sudo sysctl net.ipv4.ip_forward=1
          sudo iptables -F FORWARD
          sudo iptables -P FORWARD ACCEPT
          sudo lxc network set lxdbr0 ipv6.address none 2>/dev/null || true

      - name: Provision
        run: .mvp-workflows/provision .

      - name: Configure microk8s local registry
        run: |
          if ! command -v microk8s >/dev/null 2>&1; then exit 0; fi
          HOSTS_DIR=/var/snap/microk8s/current/args/certs.d/localhost:32000
          sudo mkdir -p "$HOSTS_DIR"
          printf 'server = "http://localhost:32000"\n\n[host."http://localhost:32000"]\n  capabilities = ["pull", "resolve"]\n' \
            | sudo tee "$HOSTS_DIR/hosts.toml" > /dev/null
          sudo systemctl restart snap.microk8s.daemon-containerd.service
          sudo microk8s status --wait-ready --timeout=120

      - name: Push rocks to local registry
        run: |
          if ! command -v microk8s >/dev/null 2>&1; then exit 0; fi
          for i in $(seq 1 30); do
            curl -sf --max-time 3 http://localhost:32000/v2/ >/dev/null 2>&1 && break || true
            sleep 5
          done
          rock_count=$(yq '.rocks | length' build-output.yaml 2>/dev/null || echo 0)
          for i in $(seq 0 $((rock_count - 1))); do
            rock_file=$(yq ".rocks[$i].output.file" build-output.yaml 2>/dev/null || true)
            image_ref=$(yq ".rocks[$i].output.image" build-output.yaml 2>/dev/null || true)
            if [[ -n "$rock_file" && "$rock_file" != "null" && -n "$image_ref" && "$image_ref" != "null" ]]; then
              echo "  pushing $rock_file → $image_ref"
              skopeo copy --dest-tls-verify=false "oci-archive:${rock_file}" "docker://${image_ref}"
              echo "  pre-pulling $image_ref into microk8s containerd cache"
              sudo microk8s ctr images pull --plain-http "${image_ref}"
            fi
          done

      - name: Test
        run: .mvp-workflows/test . --module ${{ matrix.module }}

      - name: Setup tmate session
        if: ${{ failure() && runner.debug }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 30
