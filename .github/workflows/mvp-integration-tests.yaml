name: MVP integration tests

on:
  workflow_call:
    inputs:
      mvp-workflows-ref:
        description: "Ref of javierdelapuente/mvp-workflows to use"
        type: string
        default: main
    outputs:
      plan:
        description: "The generated build-plan.yaml contents (base64-encoded)"
        value: ${{ jobs.generate-plan.outputs.plan }}

jobs:
  generate-plan:
    name: Generate build plan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      plan: ${{ steps.plan.outputs.plan }}
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Checkout mvp-workflows
        uses: actions/checkout@v4
        with:
          repository: javierdelapuente/mvp-workflows
          ref: ${{ inputs.mvp-workflows-ref }}
          path: .mvp-workflows

      - name: Install yq
        run: sudo snap install yq

      - name: Generate build plan
        id: plan
        run: |
          .mvp-workflows/generate-plan .
          echo "plan=$(base64 -w0 build-plan.yaml)" >> "$GITHUB_OUTPUT"

      - name: Upload build-plan.yaml
        uses: actions/upload-artifact@v4
        with:
          name: build-plan
          path: build-plan.yaml

  build:
    name: Build
    needs: generate-plan
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Checkout mvp-workflows
        uses: actions/checkout@v4
        with:
          repository: javierdelapuente/mvp-workflows
          ref: ${{ inputs.mvp-workflows-ref }}
          path: .mvp-workflows

      - name: Download build-plan.yaml
        uses: actions/download-artifact@v4
        with:
          name: build-plan

      - name: Set up LXD
        run: |
          sudo snap install lxd --channel=latest/stable
          sudo lxd waitready --timeout=60
          sudo lxd init --auto
          sudo lxc config set images.compression_algorithm none
          sudo iptables -I DOCKER-USER -i lxdbr0 -j ACCEPT 2>/dev/null || true
          sudo iptables -I DOCKER-USER -o lxdbr0 -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT 2>/dev/null || true
          sudo adduser "$USER" lxd

      - name: Install tools
        run: |
          sudo snap install yq &
          sudo snap install charmcraft --classic &
          sudo snap install rockcraft --classic &
          wait

      - name: Build
        run: sg lxd .mvp-workflows/build .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            build-output.yaml
            **/*.charm
            **/*.rock
          if-no-files-found: warn

  discover-tests:
    name: Discover spread tasks
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tasks: ${{ steps.list.outputs.tasks }}
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Checkout mvp-workflows
        uses: actions/checkout@v4
        with:
          repository: javierdelapuente/mvp-workflows
          ref: ${{ inputs.mvp-workflows-ref }}
          path: .mvp-workflows

      - name: Download build-output.yaml
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Install spread and yq
        run: sudo snap install spread && sudo snap install yq

      - name: Generate spread.yaml if needed
        run: .mvp-workflows/generate-spread .

      - name: List spread tasks
        id: list
        run: |
          # List all tasks for the ci backend
          all_tasks=$(spread -list ci: 2>/dev/null || true)

          # Collect --ignore patterns from extra_pytest_args to exclude modules
          ignored=()
          if [ -f build-output.yaml ]; then
            extra_count=$(yq '.charms[0].extra_pytest_args | length' build-output.yaml 2>/dev/null || echo 0)
            for i in $(seq 0 $((extra_count - 1))); do
              arg=$(yq ".charms[0].extra_pytest_args[$i]" build-output.yaml 2>/dev/null || true)
              if [[ "$arg" == --ignore=* ]]; then
                # Extract module name from path (e.g. tests/integration/test_saml.py → test_saml)
                basename=$(basename "${arg#--ignore=}" .py)
                ignored+=("$basename")
              fi
            done
          fi

          # Filter out ignored modules
          filtered=()
          while IFS= read -r task; do
            [ -z "$task" ] && continue
            skip=false
            for ign in "${ignored[@]}"; do
              if [[ "$task" == *":$ign" ]]; then
                echo "  excluding: $task (--ignore match: $ign)"
                skip=true
                break
              fi
            done
            if [[ "$skip" == "false" ]]; then
              filtered+=("$task")
            fi
          done <<< "$all_tasks"

          # Output as JSON array
          if [[ ${#filtered[@]} -eq 0 ]]; then
            echo "No tasks to run!"
            echo 'tasks=[]' >> "$GITHUB_OUTPUT"
          else
            json=$(printf '%s\n' "${filtered[@]}" | jq -R . | jq -sc .)
            echo "Discovered spread tasks: $json"
            echo "tasks=$json" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: "${{ matrix.task }}"
    needs: [build, discover-tests]
    if: ${{ needs.discover-tests.outputs.tasks != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        task: ${{ fromJson(needs.discover-tests.outputs.tasks) }}
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Checkout mvp-workflows
        uses: actions/checkout@v4
        with:
          repository: javierdelapuente/mvp-workflows
          ref: ${{ inputs.mvp-workflows-ref }}
          path: .mvp-workflows

      - name: Download build-plan.yaml
        uses: actions/download-artifact@v4
        with:
          name: build-plan

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Install spread
        run: sudo snap install spread

      - name: Configure networking for LXD containers
        run: |
          sudo sysctl net.ipv4.ip_forward=1
          sudo iptables -F FORWARD
          sudo iptables -P FORWARD ACCEPT
          sudo lxc network set lxdbr0 ipv6.address none 2>/dev/null || true

      - name: Generate spread.yaml if needed
        run: .mvp-workflows/generate-spread .

      - name: Run spread task
        run: spread ${{ matrix.task }}

      - name: Setup tmate session
        if: ${{ failure() && runner.debug }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 30

      - name: Setup tmate session
        if: ${{ failure() && runner.debug }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 30
